name: CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:

jobs:
  build-and-test:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos-arm64
          - os: macos-latest
            name: macos-x64

          # Windows: MSVC (cl.exe) via VS generator
          - os: windows-latest
            name: windows-x64
            vcpkg_triplet: x64-windows
            vs_arch: x64
          - os: windows-latest
            name: windows-arm64
            vcpkg_triplet: arm64-windows
            vs_arch: ARM64

          - os: ubuntu-24.04
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64

          # Linux armv7 (32-bit) via cross-compile on x64 runner
          - os: ubuntu-24.04
            name: linux-armv7
            cross: armv7

    permissions:
      contents: write

    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      CMAKE_VERSION: "4.2.3"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------
      # CMake (Pinned, same version everywhere)
      # ---------------------------

      - name: Install CMake ${{ env.CMAKE_VERSION }} (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          ver="${CMAKE_VERSION}"
          os="$(uname -s)"
          arch="$(uname -m)"

          if [ "$os" = "Darwin" ]; then
            pkg="cmake-${ver}-macos-universal.tar.gz"
          else
            case "$arch" in
              x86_64)  pkg="cmake-${ver}-linux-x86_64.tar.gz" ;;
              aarch64) pkg="cmake-${ver}-linux-aarch64.tar.gz" ;;
              arm64)   pkg="cmake-${ver}-linux-aarch64.tar.gz" ;;
              *) echo "Unsupported Linux arch: $arch" >&2; exit 1 ;;
            esac
          fi

          url="https://github.com/Kitware/CMake/releases/download/v${ver}/${pkg}"
          echo "Downloading: $url"

          dst="${RUNNER_TEMP}/cmake"
          rm -rf "$dst"
          mkdir -p "$dst"

          curl -fsSL "$url" -o "${RUNNER_TEMP}/${pkg}"
          tar -xzf "${RUNNER_TEMP}/${pkg}" -C "$dst" --strip-components=1

          echo "${dst}/bin" >> "$GITHUB_PATH"
          cmake --version

      - name: Install CMake ${{ env.CMAKE_VERSION }} (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y cmake --version=$env:CMAKE_VERSION --allow-downgrade
          refreshenv
          cmake --version

      # ---------------------------
      # Install deps
      # ---------------------------

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja llvm libsodium

      - name: Install dependencies (Linux native)
        if: runner.os == 'Linux' && matrix.name != 'linux-armv7'
        run: |
          sudo apt-get update
          sudo apt-get install -y zip libsodium-dev
          /home/linuxbrew/.linuxbrew/bin/brew install ninja llvm

      # armv7 cross toolchain + deps (build-only)
      - name: Install dependencies (Linux armv7 cross)
        if: runner.os == 'Linux' && matrix.name == 'linux-armv7'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            zip \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            pkg-config-arm-linux-gnueabihf

          # Build libsodium for armv7 (so link works)
          ver="1.0.21"
          curl -fsSL "https://download.libsodium.org/libsodium/releases/libsodium-${ver}.tar.gz" -o "${RUNNER_TEMP}/libsodium-${ver}.tar.gz"
          tar -xzf "${RUNNER_TEMP}/libsodium-${ver}.tar.gz" -C "${RUNNER_TEMP}"
          pushd "${RUNNER_TEMP}/libsodium-${ver}"
            ./configure \
              --host=arm-linux-gnueabihf \
              --prefix="${RUNNER_TEMP}/armv7-prefix" \
              --enable-static \
              --disable-shared
            make -j"$(nproc)"
            make install
          popd

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y 7zip
          vcpkg install libsodium --triplet "${{ matrix.vcpkg_triplet }}"

      # ✅ Ensure MSVC environment
      - name: MSVC Dev Cmd (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.name == 'windows-arm64' && 'amd64_arm64' || 'amd64' }}

      # ---------------------------
      # Toolchain: macOS + Linux (brew llvm)
      # ---------------------------

      - name: Configure LLVM toolchain (macOS and Linux)
        if: runner.os != 'Windows' && matrix.name != 'linux-armv7'
        shell: bash
        run: |
          BREW_CMD="brew"
          if [ "${{ runner.os }}" = "Linux" ]; then
            BREW_CMD="/home/linuxbrew/.linuxbrew/bin/brew"
          fi

          LLVM_PREFIX="$($BREW_CMD --prefix llvm)"
          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"

          if [ "${{ runner.os }}" = "macOS" ]; then
            LIBCXX_DIR="${LLVM_PREFIX}/lib/c++"
            SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
            echo "SDKROOT=${SDKROOT}" >> "$GITHUB_ENV"
            echo "CFLAGS=-isysroot ${SDKROOT}" >> "$GITHUB_ENV"
            echo "CXXFLAGS=-isysroot ${SDKROOT} -stdlib=libc++ -fexperimental-library" >> "$GITHUB_ENV"
            echo "LDFLAGS=-isysroot ${SDKROOT} -L${LIBCXX_DIR} -Wl,-rpath,${LIBCXX_DIR}" >> "$GITHUB_ENV"
          fi

      # armv7: create toolchain file for cross build
      - name: Create CMake toolchain (armv7)
        if: runner.os == 'Linux' && matrix.name == 'linux-armv7'
        shell: bash
        run: |
          cat > "${RUNNER_TEMP}/toolchain-armv7.cmake" <<'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR armv7)

          set(CMAKE_C_COMPILER   arm-linux-gnueabihf-gcc)
          set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)

          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF

      # ---------------------------
      # Print versions (so you can confirm parity)
      # ---------------------------

      - name: Tool versions (macOS/Linux)
        if: runner.os != 'Windows' && matrix.name != 'linux-armv7'
        shell: bash
        run: |
          echo "cmake: $(cmake --version | head -n 1)"
          echo "clang: $(clang++ --version | head -n 1)"
          echo "ninja: $(ninja --version || true)"
          if [ "${{ runner.os }}" = "Linux" ]; then
            dpkg -l | grep -E 'libsodium-dev|zip' || true
          fi

      - name: Tool versions (Linux armv7 cross)
        if: runner.os == 'Linux' && matrix.name == 'linux-armv7'
        shell: bash
        run: |
          echo "cmake: $(cmake --version | head -n 1)"
          arm-linux-gnueabihf-g++ --version | head -n 1
          echo "prefix: ${RUNNER_TEMP}/armv7-prefix"
          ls -la "${RUNNER_TEMP}/armv7-prefix/lib" || true

      - name: Tool versions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --version

          $vsver = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -property installationVersion) 2>$null
          if ($vsver) { Write-Host "Visual Studio: $vsver" }

          $cl = Get-Command cl.exe -ErrorAction SilentlyContinue
          if ($cl) {
            Write-Host "cl.exe: $($cl.Source)"
            cmd /c "cl /Bv" | Out-Host
            $global:LASTEXITCODE = 0
          }

          $z = Get-Command 7z.exe -ErrorAction SilentlyContinue
          if ($z) { cmd /c "7z" | Select-String "7-Zip" | Select-Object -First 1 | Out-Host }

      # ---------------------------
      # Configure
      # ---------------------------

      - name: Configure project (macOS)
        if: runner.os == 'macOS'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DCMAKE_OSX_SYSROOT="${SDKROOT}"
          -DCMAKE_C_COMPILER="${CC}"
          -DCMAKE_CXX_COMPILER="${CXX}"
          -DCMAKE_CXX_SCAN_FOR_MODULES=ON

      # Linux native: build with clang (works), disable tests for now
      - name: Configure project (Linux)
        if: runner.os == 'Linux' && matrix.name != 'linux-armv7'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -DCMAKE_C_COMPILER="${CC}"
          -DCMAKE_CXX_COMPILER="${CXX}"
          -DCMAKE_CXX_SCAN_FOR_MODULES=ON

      # Linux armv7: cross build with GCC, disable modules scanning for stability
      - name: Configure project (Linux armv7)
        if: runner.os == 'Linux' && matrix.name == 'linux-armv7'
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DCMAKE_TOOLCHAIN_FILE="${RUNNER_TEMP}/toolchain-armv7.cmake" \
            -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/armv7-prefix" \
            -DCMAKE_CXX_SCAN_FOR_MODULES=OFF

      # Windows: VS generator + MSVC cl.exe
      - name: Configure project (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = "${{ matrix.vs_arch }}"

          $testing = "ON"
          if ("${{ matrix.name }}" -eq "windows-arm64") { $testing = "OFF" }

          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A $arch `
            -DBUILD_TESTING=$testing `
            -DCMAKE_CONFIGURATION_TYPES="Release" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} `
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON

      # ---------------------------
      # Build
      # ---------------------------

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --parallel --config Release

      - name: Build (macOS/Linux)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel --config Release

      # ---------------------------
      # Test
      # ---------------------------

      - name: Test
        if: runner.os == 'macOS' || (runner.os == 'Windows' && matrix.name == 'windows-x64')
        run: ctest --test-dir build --output-on-failure -C Release

      # ---------------------------
      # Package
      # ---------------------------

      - name: Package artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          zip -j ${{ matrix.name }}.zip build/vaultguard build/recover_key

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "build\Release\vaultguard.exe" "vaultguard.exe" -Force
          Copy-Item "build\Release\recover_key.exe" "recover_key.exe" -Force
          7z a "${{ matrix.name }}.zip" vaultguard.exe recover_key.exe

      - name: Package artifacts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Native builds output to build/..., cross builds too (but different arch)
          zip -j ${{ matrix.name }}.zip build/vaultguard build/recover_key || {
            echo "Expected binaries not found. Listing build dir:"
            ls -la build || true
            exit 1
          }

      # ---------------------------
      # Upload + Release
      # ---------------------------

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
