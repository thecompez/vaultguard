name: CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:

jobs:
  build-and-test:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos-arm64
          - os: macos-latest
            name: macos-x64

          # Windows: MSVC (cl.exe) via VS generator
          - os: windows-latest
            name: windows-x64
            vcpkg_triplet: x64-windows
            vs_arch: x64
          - os: windows-latest
            name: windows-arm64
            vcpkg_triplet: arm64-windows
            vs_arch: ARM64
          - os: windows-latest
            name: windows-x86
            vcpkg_triplet: x86-windows
            vs_arch: Win32

          # Linux
          - os: ubuntu-24.04
            name: linux-x86
            linux_arch: x86
          - os: ubuntu-24.04
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64

          # Linux ARMv7 (armhf) via cross-compile (brew LLVM)
          - os: ubuntu-24.04
            name: linux-armv7
            linux_arch: armv7

    permissions:
      contents: write

    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      CMAKE_VERSION: "4.2.3"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------
      # CMake (Pinned)
      # ---------------------------
      - name: Install CMake ${{ env.CMAKE_VERSION }} (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          ver="${CMAKE_VERSION}"
          os="$(uname -s)"
          arch="$(uname -m)"

          if [ "$os" = "Darwin" ]; then
            pkg="cmake-${ver}-macos-universal.tar.gz"
          else
            case "$arch" in
              x86_64)  pkg="cmake-${ver}-linux-x86_64.tar.gz" ;;
              aarch64) pkg="cmake-${ver}-linux-aarch64.tar.gz" ;;
              arm64)   pkg="cmake-${ver}-linux-aarch64.tar.gz" ;;
              *) echo "Unsupported Linux arch: $arch" >&2; exit 1 ;;
            esac
          fi

          url="https://github.com/Kitware/CMake/releases/download/v${ver}/${pkg}"
          echo "Downloading: $url"

          dst="${RUNNER_TEMP}/cmake"
          rm -rf "$dst"
          mkdir -p "$dst"

          curl -fsSL "$url" -o "${RUNNER_TEMP}/${pkg}"
          tar -xzf "${RUNNER_TEMP}/${pkg}" -C "$dst" --strip-components=1

          echo "${dst}/bin" >> "$GITHUB_PATH"
          cmake --version

      - name: Install CMake ${{ env.CMAKE_VERSION }} (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y cmake --version=$env:CMAKE_VERSION --allow-downgrade
          refreshenv
          cmake --version

      # ---------------------------
      # Dependencies
      # ---------------------------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install ninja llvm libsodium

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ matrix.name }}" = "linux-armv7" ]; then
            # Keep host sources amd64-only and add ports sources for armhf
            # (avoids security.ubuntu.com armhf 404 on Noble)
            sudo dpkg --add-architecture armhf

            sudo tee /etc/apt/sources.list >/dev/null <<'EOF'
deb [arch=amd64] http://archive.ubuntu.com/ubuntu noble main universe multiverse restricted
deb [arch=amd64] http://archive.ubuntu.com/ubuntu noble-updates main universe multiverse restricted
deb [arch=amd64] http://archive.ubuntu.com/ubuntu noble-backports main universe multiverse restricted
deb [arch=amd64] http://security.ubuntu.com/ubuntu noble-security main universe multiverse restricted
EOF

            sudo tee /etc/apt/sources.list.d/armhf-ports.list >/dev/null <<'EOF'
deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble main universe multiverse restricted
deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe multiverse restricted
deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-backports main universe multiverse restricted
deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-security main universe multiverse restricted
EOF

            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zip pkg-config \
              libc6-dev:armhf linux-libc-dev:armhf \
              libstdc++-13-dev:armhf libgcc-13-dev:armhf \
              libsodium-dev:armhf

          else
            sudo apt-get update

            if [ "${{ matrix.name }}" = "linux-x86" ]; then
              sudo apt-get install -y zip gcc-multilib g++-multilib libc6-dev-i386 pkg-config
              sudo dpkg --add-architecture i386
              sudo apt-get update
              sudo apt-get install -y libsodium-dev:i386
            else
              sudo apt-get install -y zip libsodium-dev
            fi
          fi

          /home/linuxbrew/.linuxbrew/bin/brew install ninja llvm

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y 7zip
          vcpkg install libsodium:${{ matrix.vcpkg_triplet }}

      - name: MSVC Dev Cmd (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.name == 'windows-arm64' && 'amd64_arm64' || (matrix.name == 'windows-x86' && 'amd64_x86' || 'amd64') }}

      # ---------------------------
      # Toolchain: brew LLVM (macOS + Linux)
      # ---------------------------
      - name: Configure LLVM toolchain (macOS and Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          BREW_CMD="brew"
          if [ "${{ runner.os }}" = "Linux" ]; then
            BREW_CMD="/home/linuxbrew/.linuxbrew/bin/brew"
          fi

          LLVM_PREFIX="$($BREW_CMD --prefix llvm)"
          echo "LLVM_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"

          if [ "${{ runner.os }}" = "macOS" ]; then
            LIBCXX_DIR="${LLVM_PREFIX}/lib/c++"
            SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
            echo "SDKROOT=${SDKROOT}" >> "$GITHUB_ENV"
            echo "CFLAGS=-isysroot ${SDKROOT}" >> "$GITHUB_ENV"
            echo "CXXFLAGS=-isysroot ${SDKROOT} -stdlib=libc++ -fexperimental-library" >> "$GITHUB_ENV"
            echo "LDFLAGS=-isysroot ${SDKROOT} -L${LIBCXX_DIR} -Wl,-rpath,${LIBCXX_DIR}" >> "$GITHUB_ENV"
          fi

      # ---------------------------
      # Versions
      # ---------------------------
      - name: Tool versions (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "cmake: $(cmake --version | head -n 1)"
          echo "clang: $(clang++ --version | head -n 1)"
          echo "ninja: $(ninja --version || true)"
          if [ "${{ runner.os }}" = "Linux" ]; then
            dpkg -l | grep -E 'libsodium-dev|zip|armhf|i386' || true
          fi

      - name: Tool versions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --version
          $vsver = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -property installationVersion) 2>$null
          if ($vsver) { Write-Host "Visual Studio: $vsver" }

          $cl = Get-Command cl.exe -ErrorAction SilentlyContinue
          if ($cl) {
            Write-Host "cl.exe: $($cl.Source)"
            cmd /c "cl /Bv" | Out-Host
            $global:LASTEXITCODE = 0
          }

          $z = Get-Command 7z.exe -ErrorAction SilentlyContinue
          if ($z) { cmd /c "7z" | Select-String "7-Zip" | Select-Object -First 1 | Out-Host }

      # ---------------------------
      # Configure
      # ---------------------------
      - name: Configure project (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_OSX_SYSROOT="${SDKROOT}" \
            -DCMAKE_C_COMPILER="${CC}" \
            -DCMAKE_CXX_COMPILER="${CXX}" \
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON

      - name: Configure project (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ matrix.name }}" = "linux-armv7" ]; then
            SYSROOT="/usr/arm-linux-gnueabihf"
            TARGET="arm-linux-gnueabihf"
            SCAN_DEPS="${LLVM_PREFIX}/bin/clang-scan-deps"

            test -x "${SCAN_DEPS}" || { echo "Missing: ${SCAN_DEPS}"; exit 1; }

            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_TESTING=OFF \
              -DCMAKE_SYSTEM_NAME=Linux \
              -DCMAKE_SYSTEM_PROCESSOR=armv7 \
              -DCMAKE_SYSROOT="${SYSROOT}" \
              -DCMAKE_C_COMPILER="${CC}" \
              -DCMAKE_CXX_COMPILER="${CXX}" \
              -DCMAKE_C_COMPILER_TARGET="${TARGET}" \
              -DCMAKE_CXX_COMPILER_TARGET="${TARGET}" \
              -DCMAKE_C_FLAGS="--target=${TARGET} --sysroot=${SYSROOT}" \
              -DCMAKE_CXX_FLAGS="--target=${TARGET} --sysroot=${SYSROOT}" \
              -DCMAKE_EXE_LINKER_FLAGS="--target=${TARGET} --sysroot=${SYSROOT} -fuse-ld=lld" \
              -DCMAKE_CXX_COMPILER_CLANG_SCAN_DEPS="${SCAN_DEPS}" \
              -DCMAKE_CXX_SCAN_FOR_MODULES=ON \
              -DCMAKE_FIND_ROOT_PATH="${SYSROOT};/usr/lib/${TARGET};/usr/include" \
              -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
              -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
              -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY
            exit 0
          fi

          extra=""
          if [ "${{ matrix.name }}" = "linux-x86" ]; then
            extra="-DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32 -DCMAKE_EXE_LINKER_FLAGS=-m32"
          fi

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DCMAKE_C_COMPILER="${CC}" \
            -DCMAKE_CXX_COMPILER="${CXX}" \
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON \
            $extra

      - name: Configure project (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = "${{ matrix.vs_arch }}"
          $testing = "ON"
          if ("${{ matrix.name }}" -eq "windows-arm64") { $testing = "OFF" }

          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A $arch `
            -DBUILD_TESTING=$testing `
            -DCMAKE_CONFIGURATION_TYPES="Release" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} `
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON

      # ---------------------------
      # Build
      # ---------------------------
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --parallel --config Release

      - name: Build (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build build --parallel --config Release

      # ---------------------------
      # Test
      # ---------------------------
      - name: Test
        if: runner.os == 'macOS' || (runner.os == 'Windows' && matrix.name == 'windows-x64')
        shell: bash
        run: ctest --test-dir build --output-on-failure -C Release

      # ---------------------------
      # Package
      # ---------------------------
      - name: Package artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          zip -j ${{ matrix.name }}.zip build/vaultguard build/recover_key

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "build\Release\vaultguard.exe" "vaultguard.exe" -Force
          Copy-Item "build\Release\recover_key.exe" "recover_key.exe" -Force
          7z a "${{ matrix.name }}.zip" vaultguard.exe recover_key.exe

      - name: Package artifacts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          zip -j ${{ matrix.name }}.zip build/vaultguard build/recover_key

      # ---------------------------
      # Upload + Release
      # ---------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
