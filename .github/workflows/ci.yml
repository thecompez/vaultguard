name: CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:

jobs:
  build-and-test:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos-arm64
          - os: macos-latest
            name: macos-x64
          - os: windows-latest
            name: windows-x64
            vcpkg_triplet: x64-windows
            clang_target: x86_64-pc-windows-msvc
            msvc_arch: amd64
          - os: windows-latest
            name: windows-arm64
            vcpkg_triplet: arm64-windows
            clang_target: aarch64-pc-windows-msvc
            msvc_arch: amd64_arm64
          - os: ubuntu-24.04
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64

    permissions:
      contents: write

    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # macOS: Clang 21.x via Homebrew
      # -------------------------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja libsodium llvm@21

      - name: Configure LLVM toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          LLVM_PREFIX="$(brew --prefix llvm@21)"
          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"

      # -------------------------
      # Linux: Clang 21.x via Linuxbrew
      # -------------------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zip libsodium-dev
          /home/linuxbrew/.linuxbrew/bin/brew update
          /home/linuxbrew/.linuxbrew/bin/brew install cmake ninja llvm@21

      - name: Configure LLVM toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          LLVM_PREFIX="$(/home/linuxbrew/.linuxbrew/bin/brew --prefix llvm@21)"
          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"

      # -------------------------
      # Windows: Ninja + clang++ (GNU-style driver) + MSVC env
      # - Clang 21.x installed via winget (works on hosted runners)
      # - Use clang++ + clang-scan-deps so CMake can scan C++20 Modules graph
      # -------------------------
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y ninja
          vcpkg install libsodium --triplet "${{ matrix.vcpkg_triplet }}"

      - name: MSVC Dev Cmd (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install LLVM Clang 21.x (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          winget source update

          # Install/upgrade LLVM.LLVM (currently delivers 21.x on runners)
          winget install -e --id LLVM.LLVM --accept-package-agreements --accept-source-agreements --source winget

          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path $llvmBin)) { throw "LLVM bin not found: $llvmBin" }

          Add-Content $env:GITHUB_PATH $llvmBin

          $clangpp = Join-Path $llvmBin "clang++.exe"
          $clang = Join-Path $llvmBin "clang.exe"
          $scan = Join-Path $llvmBin "clang-scan-deps.exe"

          if (-not (Test-Path $clangpp)) { throw "clang++.exe not found at: $clangpp" }
          if (-not (Test-Path $clang))   { throw "clang.exe not found at: $clang" }
          if (-not (Test-Path $scan))    { throw "clang-scan-deps.exe not found at: $scan" }

          echo "CLANGPP=$clangpp" >> $env:GITHUB_ENV
          echo "CLANG=$clang" >> $env:GITHUB_ENV
          echo "CLANG_SCAN_DEPS=$scan" >> $env:GITHUB_ENV

          & $clangpp --version
          & $scan --version

      # -------------------------
      # Configure
      # -------------------------
      - name: Configure project (macOS)
        if: runner.os == 'macOS'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DCMAKE_C_COMPILER="${CC}"
          -DCMAKE_CXX_COMPILER="${CXX}"

      - name: Configure project (Linux)
        if: runner.os == 'Linux'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DCMAKE_C_COMPILER="${CC}"
          -DCMAKE_CXX_COMPILER="${CXX}"

      - name: Configure project (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $target = "${{ matrix.clang_target }}"
          $triplet = "${{ matrix.vcpkg_triplet }}"

          # Use clang/clang++ with MSVC target triple (NOT clang-cl) so CMake modules scanning is supported.
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTING=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=$triplet `
            -DCMAKE_C_COMPILER="$env:CLANG" `
            -DCMAKE_CXX_COMPILER="$env:CLANGPP" `
            -DCMAKE_C_FLAGS="--target=$target" `
            -DCMAKE_CXX_FLAGS="--target=$target -std=c++2b" `
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON

      # -------------------------
      # Build + Test
      # -------------------------
      - name: Build
        run: cmake --build build --parallel --config Release

      - name: Test
        if: matrix.name != 'windows-arm64'
        run: ctest --test-dir build --output-on-failure -C Release

      # -------------------------
      # Package
      # -------------------------
      - name: Package artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          zip -j ${{ matrix.name }}.zip build/vaultguard build/recover_key

      - name: Package artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          zip -j ${{ matrix.name }}.zip build/vaultguard build/recover_key

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp build/vaultguard.exe . || cp build/Release/vaultguard.exe .
          cp build/recover_key.exe . || cp build/Release/recover_key.exe .
          7z a ${{ matrix.name }}.zip vaultguard.exe recover_key.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
