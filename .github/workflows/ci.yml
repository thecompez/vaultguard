name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:

jobs:
  build-and-test:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos-arm64
          - os: macos-latest
            name: macos-x64
          - os: windows-latest
            name: windows-x64
            vcpkg_triplet: x64-windows
            cmake_arch: x64
          - os: windows-latest
            name: windows-arm64
            vcpkg_triplet: arm64-windows
            cmake_arch: ARM64
          - os: ubuntu-24.04
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64

    permissions:
      contents: write
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja llvm libsodium

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y llvm
          vcpkg install libsodium --triplet "${{ matrix.vcpkg_triplet }}"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libsodium-dev zip
          /home/linuxbrew/.linuxbrew/bin/brew install cmake ninja llvm

      - name: Configure LLVM toolchain (macOS and Linux)
        if: runner.os != 'Windows'
        run: |
          BREW_CMD="brew"
          if [ "${{ runner.os }}" == "Linux" ]; then
            BREW_CMD="/home/linuxbrew/.linuxbrew/bin/brew"
          fi
          LLVM_PREFIX="$($BREW_CMD --prefix llvm)"
          LIBCXX_DIR="${LLVM_PREFIX}/lib/c++"
          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"
          if [ "${{ runner.os }}" == "macOS" ]; then
            SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
            echo "SDKROOT=${SDKROOT}" >> "$GITHUB_ENV"
            echo "CFLAGS=-isysroot ${SDKROOT}" >> "$GITHUB_ENV"
            echo "CXXFLAGS=-isysroot ${SDKROOT} -stdlib=libc++ -fexperimental-library" >> "$GITHUB_ENV"
            echo "LDFLAGS=-isysroot ${SDKROOT} -L${LIBCXX_DIR} -Wl,-rpath,${LIBCXX_DIR}" >> "$GITHUB_ENV"
          else
            echo "CXXFLAGS=-stdlib=libc++ -fexperimental-library" >> "$GITHUB_ENV"
            echo "LDFLAGS=-L${LIBCXX_DIR} -Wl,-rpath,${LIBCXX_DIR}" >> "$GITHUB_ENV"
          fi

      - name: Configure project (macOS)
        if: runner.os == 'macOS'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DCMAKE_OSX_SYSROOT="${SDKROOT}"
          -DCMAKE_C_COMPILER="${CC}"
          -DCMAKE_CXX_COMPILER="${CXX}"

      - name: Configure project (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = "${{ matrix.cmake_arch }}"
          $archFlag = ""
          if ($arch -ne "") { $archFlag = "-A $arch" }

          # Use clang-cl (LLVM on Windows runner)
          cmake -S . -B build $archFlag `
            -G "Visual Studio 17 2022" `
            -T ClangCL `
            -DBUILD_TESTING=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} `
            -DCMAKE_CXX_STANDARD=23 `
            -DCMAKE_CXX_STANDARD_REQUIRED=ON `
            -DCMAKE_CXX_FLAGS="/std:c++latest /EHsc"

      - name: Configure project (Linux)
        if: runner.os == 'Linux'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DCMAKE_C_COMPILER="${CC}"
          -DCMAKE_CXX_COMPILER="${CXX}"

      - name: Build
        run: cmake --build build --parallel --config Release

      - name: Test
        if: matrix.cmake_arch != 'ARM64'
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Package artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          zip -j ${{ matrix.name }}.zip build/vaultguard build/recover_key

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp build/Release/vaultguard.exe . || cp build/vaultguard.exe .
          cp build/Release/recover_key.exe . || cp build/recover_key.exe .
          7z a ${{ matrix.name }}.zip vaultguard.exe recover_key.exe

      - name: Package artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          zip -j ${{ matrix.name }}.zip build/vaultguard build/recover_key

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}