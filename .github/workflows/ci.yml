name: CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:

jobs:
  build-and-test:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos-arm64
          - os: macos-latest
            name: macos-x64

          - os: windows-latest
            name: windows-x64
            vcpkg_triplet: x64-windows
            clang_target: x86_64-pc-windows-msvc

          - os: windows-latest
            name: windows-arm64
            vcpkg_triplet: arm64-windows
            clang_target: aarch64-pc-windows-msvc

          - os: ubuntu-24.04
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64

    permissions:
      contents: write

    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- macOS ----------------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja llvm libsodium

      # ---------------- Linux ----------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libsodium-dev zip
          /home/linuxbrew/.linuxbrew/bin/brew install cmake ninja llvm

      # ---------------- Windows ----------------
      - name: Install Ninja + vcpkg deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y ninja
          vcpkg install libsodium --triplet "${{ matrix.vcpkg_triplet }}"

      # ✅ Ensure MSVC environment (INCLUDE/LIB/LINK/RC/MT) is set for clang-cl
      - name: MSVC Dev Cmd (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.name == 'windows-arm64' && 'amd64_arm64' || 'amd64' }}

      # ✅ Install LLVM/Clang 21.x from official llvm-project GitHub releases (zip preferred)
      - name: Install LLVM 21.x (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          $repo = "llvm/llvm-project"
          $headers = @{ "Accept" = "application/vnd.github+json" }
          if ($env:GITHUB_TOKEN) { $headers["Authorization"] = "Bearer $env:GITHUB_TOKEN" }

          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases?per_page=50" -Headers $headers
          $rel = $releases | Where-Object { $_.tag_name -match '^llvmorg-21\.' } | Select-Object -First 1
          if (-not $rel) { throw "No llvmorg-21.* release found." }

          $asset = $rel.assets | Where-Object { $_.name -match 'win64.*\.zip$' } | Select-Object -First 1
          $isZip = $true
          if (-not $asset) {
            $asset = $rel.assets | Where-Object { $_.name -match 'win64.*\.exe$' } | Select-Object -First 1
            $isZip = $false
          }
          if (-not $asset) { throw "No Windows win64 asset (.zip or .exe) found for $($rel.tag_name)." }

          $tmp = Join-Path $env:RUNNER_TEMP "llvm21"
          New-Item -ItemType Directory -Force -Path $tmp | Out-Null

          $dl = Join-Path $tmp $asset.name
          Write-Host "Downloading: $($asset.browser_download_url)"
          Invoke-WebRequest -Uri $asset.browser_download_url -Headers $headers -OutFile $dl

          $root = Join-Path $tmp "root"
          New-Item -ItemType Directory -Force -Path $root | Out-Null

          if ($isZip) {
            Expand-Archive -Path $dl -DestinationPath $root -Force
            $top = Get-ChildItem $root -Directory | Select-Object -First 1
            if (-not $top) { throw "LLVM zip extracted but no top directory found." }
            $llvmRoot = $top.FullName
          } else {
            $llvmRoot = Join-Path $root "LLVM"
            New-Item -ItemType Directory -Force -Path $llvmRoot | Out-Null
            Write-Host "Installing LLVM silently to: $llvmRoot"
            & $dl /S /D="$llvmRoot"
          }

          $llvmBin = Join-Path $llvmRoot "bin"
          if (-not (Test-Path $llvmBin)) { throw "LLVM bin not found: $llvmBin" }

          Add-Content $env:GITHUB_PATH $llvmBin

          $clangCl  = Join-Path $llvmBin "clang-cl.exe"
          $scanDeps = Join-Path $llvmBin "clang-scan-deps.exe"

          if (-not (Test-Path $clangCl))  { throw "clang-cl.exe not found at: $clangCl" }
          if (-not (Test-Path $scanDeps)) { throw "clang-scan-deps.exe not found at: $scanDeps" }

          & $clangCl --version
          & $scanDeps --version

          echo "CLANG_CL=$clangCl" >> $env:GITHUB_ENV
          echo "CLANG_SCAN_DEPS=$scanDeps" >> $env:GITHUB_ENV

      # ---------------- Toolchain (macOS/Linux) ----------------
      - name: Configure LLVM toolchain (macOS and Linux)
        if: runner.os != 'Windows'
        run: |
          BREW_CMD="brew"
          if [ "${{ runner.os }}" == "Linux" ]; then
            BREW_CMD="/home/linuxbrew/.linuxbrew/bin/brew"
          fi
          LLVM_PREFIX="$($BREW_CMD --prefix llvm)"
          LIBCXX_DIR="${LLVM_PREFIX}/lib/c++"

          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"

          if [ "${{ runner.os }}" == "macOS" ]; then
            SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
            echo "SDKROOT=${SDKROOT}" >> "$GITHUB_ENV"
            echo "CFLAGS=-isysroot ${SDKROOT}" >> "$GITHUB_ENV"
            echo "CXXFLAGS=-isysroot ${SDKROOT} -stdlib=libc++ -fexperimental-library" >> "$GITHUB_ENV"
            echo "LDFLAGS=-isysroot ${SDKROOT} -L${LIBCXX_DIR} -Wl,-rpath,${LIBCXX_DIR}" >> "$GITHUB_ENV"
          else
            echo "CXXFLAGS=-stdlib=libc++ -fexperimental-library" >> "$GITHUB_ENV"
            echo "LDFLAGS=-L${LIBCXX_DIR} -Wl,-rpath,${LIBCXX_DIR}" >> "$GITHUB_ENV"
          fi

      # ---------------- Configure ----------------
      - name: Configure project (macOS)
        if: runner.os == 'macOS'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DCMAKE_OSX_SYSROOT="${SDKROOT}"
          -DCMAKE_C_COMPILER="${CC}"
          -DCMAKE_CXX_COMPILER="${CXX}"

      - name: Configure project (Linux)
        if: runner.os == 'Linux'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DCMAKE_C_COMPILER="${CC}"
          -DCMAKE_CXX_COMPILER="${CXX}"

      # ✅ Windows: Ninja + clang-cl + scan-deps for C++ modules scanning
      - name: Configure project (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.clang_target }}"

          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTING=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} `
            -DCMAKE_C_COMPILER="$env:CLANG_CL" `
            -DCMAKE_CXX_COMPILER="$env:CLANG_CL" `
            -DCMAKE_C_COMPILER_TARGET="$target" `
            -DCMAKE_CXX_COMPILER_TARGET="$target" `
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON `
            -DCMAKE_CXX_COMPILER_CLANG_SCAN_DEPS="$env:CLANG_SCAN_DEPS" `
            -DCMAKE_CXX_FLAGS="/std:c++latest /EHsc"

      # ---------------- Build/Test ----------------
      - name: Build
        run: cmake --build build --parallel --config Release

      - name: Test
        if: matrix.name != 'windows-arm64'
        run: ctest --test-dir build --output-on-failure -C Release

      # ---------------- Package ----------------
      - name: Package artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          zip -j ${{ matrix.name }}.zip build/vaultguard build/recover_key

      - name: Package artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          zip -j ${{ matrix.name }}.zip build/vaultguard build/recover_key

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp build/vaultguard.exe . || cp build/Release/vaultguard.exe .
          cp build/recover_key.exe . || cp build/Release/recover_key.exe .
          7z a ${{ matrix.name }}.zip vaultguard.exe recover_key.exe

      # ---------------- Upload/Release ----------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
