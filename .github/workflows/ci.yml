name: CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:

jobs:
  build-and-test:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos-arm64
          - os: macos-latest
            name: macos-x64

          - os: windows-latest
            name: windows-x64
            vcpkg_triplet: x64-windows
            clang_target: x86_64-pc-windows-msvc
          - os: windows-latest
            name: windows-arm64
            vcpkg_triplet: arm64-windows
            clang_target: aarch64-pc-windows-msvc

          - os: ubuntu-24.04
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64

    permissions:
      contents: write

    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------
      # Dependencies
      # ---------------------------

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja llvm libsodium

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zip libsodium-dev
          /home/linuxbrew/.linuxbrew/bin/brew install cmake ninja llvm

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y cmake llvm ninja 7zip
          vcpkg install libsodium --triplet "${{ matrix.vcpkg_triplet }}"

          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path $llvmBin)) { throw "LLVM bin not found: $llvmBin" }
          Add-Content $env:GITHUB_PATH $llvmBin

          cmake --version
          clang-cl --version

      # ✅ Ensure MSVC environment (INCLUDE/LIB/LINK/RC/MT)
      - name: MSVC Dev Cmd (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.name == 'windows-arm64' && 'amd64_arm64' || 'amd64' }}

      # ---------------------------
      # Toolchain setup (macOS/Linux)
      # ---------------------------

      - name: Configure LLVM toolchain (macOS and Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BREW_CMD="brew"
          if [ "${{ runner.os }}" = "Linux" ]; then
            BREW_CMD="/home/linuxbrew/.linuxbrew/bin/brew"
          fi

          LLVM_PREFIX="$($BREW_CMD --prefix llvm)"
          LIBCXX_DIR="${LLVM_PREFIX}/lib/c++"

          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"

          if [ "${{ runner.os }}" = "macOS" ]; then
            SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
            echo "SDKROOT=${SDKROOT}" >> "$GITHUB_ENV"
            echo "CFLAGS=-isysroot ${SDKROOT}" >> "$GITHUB_ENV"
            echo "CXXFLAGS=-isysroot ${SDKROOT} -stdlib=libc++ -fexperimental-library" >> "$GITHUB_ENV"
            echo "LDFLAGS=-isysroot ${SDKROOT} -L${LIBCXX_DIR} -Wl,-rpath,${LIBCXX_DIR}" >> "$GITHUB_ENV"
          fi

      # ---------------------------
      # Configure
      # ---------------------------

      - name: Configure project (macOS)
        if: runner.os == 'macOS'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DCMAKE_OSX_SYSROOT="${SDKROOT}"
          -DCMAKE_C_COMPILER="${CC}"
          -DCMAKE_CXX_COMPILER="${CXX}"
          -DCMAKE_CXX_SCAN_FOR_MODULES=ON

      # ✅ Linux: build artifacts only (tests off to avoid GCC modules ICE / clang+libstdc++ module-mode issues)
      - name: Configure project (Linux)
        if: runner.os == 'Linux'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -DCMAKE_C_COMPILER="${CC}"
          -DCMAKE_CXX_COMPILER="${CXX}"
          -DCMAKE_CXX_SCAN_FOR_MODULES=ON

      # ✅ Windows: build artifacts only; disable module scanning so CMake generation succeeds
      - name: Configure project (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.clang_target }}"

          cmake -S . -B build -G Ninja `
            -DBUILD_TESTING=OFF `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_C_FLAGS="--target=$target" `
            -DCMAKE_CXX_FLAGS="--target=$target /std:c++latest /EHsc" `
            -DCMAKE_CXX_SCAN_FOR_MODULES=OFF

      # ---------------------------
      # Build + Test
      # ---------------------------

      - name: Build
        run: cmake --build build --parallel --config Release

      - name: Test (macOS only)
        if: runner.os == 'macOS'
        run: ctest --test-dir build --output-on-failure -C Release

      # ---------------------------
      # Package
      # ---------------------------

      - name: Package artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          zip -j ${{ matrix.name }}.zip build/vaultguard build/recover_key

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "build\vaultguard.exe") { Copy-Item "build\vaultguard.exe" "vaultguard.exe" -Force }
          elseif (Test-Path "build\Release\vaultguard.exe") { Copy-Item "build\Release\vaultguard.exe" "vaultguard.exe" -Force }
          else { throw "vaultguard.exe not found in build output." }

          if (Test-Path "build\recover_key.exe") { Copy-Item "build\recover_key.exe" "recover_key.exe" -Force }
          elseif (Test-Path "build\Release\recover_key.exe") { Copy-Item "build\Release\recover_key.exe" "recover_key.exe" -Force }
          else { throw "recover_key.exe not found in build output." }

          7z a "${{ matrix.name }}.zip" vaultguard.exe recover_key.exe

      - name: Package artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          zip -j ${{ matrix.name }}.zip build/vaultguard build/recover_key

      # ---------------------------
      # Upload + Release
      # ---------------------------

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
